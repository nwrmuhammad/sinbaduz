<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Sinbad</title>
  <script src="tracker.js"></script>
  <!-- robots meta: axtarish tizimlari topmaydi -->
  <meta name="robots" content="noindex, nofollow" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --dark: #0D0D0D;
      --dark2: #131313;
      --dark3: #1C1C1C;
      --dark4: #242424;
      --text: #E8E0D0;
      --text-muted: #6A6055;
      --border: rgba(201,168,76,0.18);
      --instagram: #E1306C;
      --telegram: #2CA5E0;
      --google: #4285F4;
      --yandex: #FF0000;
      --direct: #8B7355;
      --other: #5A5A5A;
      --success: #4CAF50;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* === LOGIN SCREEN === */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--gold-light);
      margin-bottom: 8px;
    }

    .login-card p {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-bottom: 32px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .login-card input {
      width: 100%;
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-align: center;
      outline: none;
      font-family: 'Inter', sans-serif;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .login-card input:focus { border-color: var(--gold); }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border: none;
      border-radius: 8px;
      padding: 14px;
      color: var(--dark);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .login-btn:hover { opacity: 0.88; }

    .login-error {
      color: #E05C5C;
      font-size: 0.82rem;
      margin-top: 12px;
      display: none;
    }

    /* === DASHBOARD === */
    #dashboard { display: none; }

    .topbar {
      background: var(--dark2);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--gold-light);
      letter-spacing: 0.05em;
    }

    .topbar-badge {
      background: rgba(201,168,76,0.15);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .topbar-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 16px;
      color: var(--gold);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.05em;
    }

    .btn-outline:hover { background: var(--dark3); }

    .btn-gold {
      background: var(--gold);
      border: none;
      border-radius: 7px;
      padding: 8px 16px;
      color: var(--dark);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.05em;
    }

    .btn-gold:hover { opacity: 0.85; }

    .main {
      padding: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent, var(--gold));
    }

    .stat-card.instagram { --accent: var(--instagram); }
    .stat-card.telegram { --accent: var(--telegram); }
    .stat-card.google { --accent: var(--google); }
    .stat-card.yandex { --accent: var(--yandex); }
    .stat-card.direct { --accent: var(--direct); }
    .stat-card.total { --accent: var(--gold); }

    .stat-icon { font-size: 20px; margin-bottom: 10px; }
    .stat-number {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .stat-pct {
      font-size: 0.72rem;
      color: var(--accent, var(--gold));
      font-weight: 600;
      margin-top: 4px;
    }

    /* SOURCE BAR CHART */
    .bar-section {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .bar-label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      width: 110px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .bar-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 8px;
      background: var(--dark4);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    }

    .bar-count {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    /* BOOKINGS TABLE */
    .table-section {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .table-header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .table-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    .booking-count {
      font-size: 0.75rem;
      background: rgba(201,168,76,0.12);
      border-radius: 20px;
      padding: 3px 10px;
      color: var(--gold);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 10px 16px;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: left;
      background: var(--dark3);
    }

    tbody tr {
      border-top: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }

    tbody tr:hover { background: var(--dark3); }

    tbody td {
      padding: 14px 16px;
      font-size: 0.85rem;
      color: var(--text);
      vertical-align: middle;
    }

    .source-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .source-tag.instagram { background: rgba(225,48,108,0.15); color: var(--instagram); }
    .source-tag.telegram { background: rgba(44,165,224,0.15); color: var(--telegram); }
    .source-tag.google_maps { background: rgba(66,133,244,0.15); color: var(--google); }
    .source-tag.yandex_maps { background: rgba(255,0,0,0.12); color: var(--yandex); }
    .source-tag.direct { background: rgba(139,115,85,0.15); color: var(--direct); }
    .source-tag.other { background: rgba(90,90,90,0.2); color: #888; }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    .empty-icon { font-size: 32px; margin-bottom: 12px; }

    .daily-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 6px;
      margin-bottom: 32px;
    }

    .day-cell {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 8px;
      text-align: center;
    }

    .day-date { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 4px; }
    .day-count { font-size: 1.1rem; font-weight: 700; color: var(--gold); }

    .refresh-info {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 20px;
      padding-bottom: 40px;
    }

    @media (max-width: 640px) {
      .topbar { padding: 12px 16px; }
      .main { padding: 16px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      table thead { display: none; }
      tbody td { padding: 8px 12px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<!-- ============================
     LOGIN SCREEN
============================= -->
<div id="loginScreen">
  <div class="login-card">
    <h2>Admin Panel</h2>
    <p>Sinbad · Maxfiy Sahifa</p>
    <input type="password" id="passwordInput" placeholder="Parolni kiriting" onkeydown="if(event.key==='Enter') checkPassword()" />
    <button class="login-btn" onclick="checkPassword()">Kirish</button>
    <p class="login-error" id="loginError">Parol noto'g'ri. Qayta urining.</p>
  </div>
</div>

<!-- ============================
     DASHBOARD
============================= -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">⚓ Sinbad</span>
      <span class="topbar-badge">Admin</span>
    </div>
    <div class="topbar-actions">
      <button class="btn-outline" onclick="refreshData()">↻ Yangilash</button>
      <button class="btn-gold" onclick="downloadAllExcel()">↓ Excel Yuklab Olish</button>
      <button class="btn-outline" onclick="logout()" style="color:var(--text-muted)">Chiqish</button>
    </div>
  </div>

  <div class="main">

    <!-- VISITORS STATS -->
    <p class="section-title">Tashrif Buyuruvchilar</p>
    <div class="stats-grid" id="statsGrid"></div>

    <!-- SOURCE BARS -->
    <p class="section-title">Manba bo'yicha taqsimot</p>
    <div class="bar-section" id="barSection"></div>

    <!-- DAILY VISITS -->
    <p class="section-title">Kunlik Tashrif</p>
    <div class="daily-grid" id="dailyGrid"></div>

    <!-- BOOKINGS TABLE -->
    <!-- <p class="section-title">Qabulga Yozilganlar</p>
    <div class="table-section">
      <div class="table-header">
        <span class="table-title">Barcha Yozuvlar</span>
        <span class="booking-count" id="bookingCountBadge">0 ta</span>
      </div>
      <div id="tableContainer"></div>
    </div> -->

    <div class="refresh-info" id="refreshInfo"></div>
  </div>
</div>


<script src="tracker.js"></script>
</body>
</html>
