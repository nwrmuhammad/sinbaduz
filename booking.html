<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qabulga Yozilish — Sinbad</title>
  <script src="tracker.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --dark: #0D0D0D;
      --dark2: #1A1A1A;
      --dark3: #252525;
      --text: #E8E0D0;
      --text-muted: #8A8070;
      --border: rgba(201,168,76,0.25);
      --success: #4CAF50;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-mark {
      width: 56px;
      height: 56px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .form-card {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    input, select, textarea {
      width: 100%;
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      appearance: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
    }

    input::placeholder, textarea::placeholder {
      color: var(--text-muted);
    }

    select option {
      background: var(--dark3);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border: none;
      border-radius: 8px;
      padding: 16px;
      color: var(--dark);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 8px;
    }

    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }

    .success-message {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: rgba(76,175,80,0.15);
      border: 2px solid var(--success);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .success-message h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--gold-light);
      margin-bottom: 10px;
    }

    .success-message p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      color: var(--gold);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .download-btn:hover { background: var(--dark); }

    .footer-note {
      text-align: center;
      margin-top: 28px;
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      .form-card { padding: 28px 20px; }
      .row-2 { grid-template-columns: 1fr; }
      .header h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-mark">⚓</div>
      <h1>Qabulga Yozilish</h1>
      <p>SINBAD · PREMIUM XIZMAT</p>
    </div>

    <div class="form-card">
      <!-- FORM -->
      <div id="bookingForm">
        <p class="section-label">Shaxsiy Ma'lumotlar</p>

        <div class="form-group">
          <label>Ism va Familiya *</label>
          <input type="text" id="fullName" placeholder="Abdullayev Jasur" required />
        </div>

        <div class="row-2">
          <div class="form-group">
            <label>Telefon *</label>
            <input type="tel" id="phone" placeholder="+998 90 123 45 67" required />
          </div>
          <div class="form-group">
            <label>Yosh</label>
            <input type="number" id="age" placeholder="25" min="1" max="120" />
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="example@mail.com" />
        </div>

        <hr class="divider" />
        <p class="section-label">Xizmat Ma'lumotlari</p>

        <div class="form-group">
          <label>Xizmat Turi *</label>
          <select id="serviceType" required>
            <option value="" disabled selected>Tanlang...</option>
            <option value="Konsultatsiya">Konsultatsiya</option>
            <option value="Davolanish kursi">Davolanish kursi</option>
            <option value="Profilaktika">Profilaktika tekshiruvi</option>
            <option value="Massaj">Massaj</option>
            <option value="Boshqa">Boshqa</option>
          </select>
        </div>

        <div class="row-2">
          <div class="form-group">
            <label>Sana *</label>
            <input type="date" id="bookingDate" required />
          </div>
          <div class="form-group">
            <label>Vaqt *</label>
            <input type="time" id="bookingTime" required />
          </div>
        </div>

        <div class="form-group">
          <label>Qo'shimcha Ma'lumot</label>
          <textarea id="notes" placeholder="Muammo yoki so'rovingizni yozing..."></textarea>
        </div>

        <button class="submit-btn" onclick="submitBooking()">
          ✦ Qabulga Yozilish
        </button>
      </div>

      <!-- SUCCESS -->
      <div class="success-message" id="successMsg">
        <div class="success-icon">✓</div>
        <h2>Muvaffaqiyatli!</h2>
        <p>Qabulga yozildingiz.<br/>Tez orada siz bilan bog'lanamiz.</p>
        <a class="download-btn" onclick="downloadMyBooking()">
          ↓ Excel faylni yuklash
        </a>
      </div>
    </div>

    <p class="footer-note">
      Ma'lumotlaringiz maxfiy saqlanadi.<br/>
      Savollar bo'lsa murojaat qiling.
    </p>
  </div>

  <script>
    // Minimal sanani bugundan boshlab qilish
    const dateInput = document.getElementById('bookingDate');
    const today = new Date().toISOString().split('T')[0];
    dateInput.setAttribute('min', today);

    let lastBooking = null;

    function submitBooking() {
      const fullName = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const serviceType = document.getElementById('serviceType').value;
      const bookingDate = document.getElementById('bookingDate').value;
      const bookingTime = document.getElementById('bookingTime').value;

      if (!fullName || !phone || !serviceType || !bookingDate || !bookingTime) {
        alert('Iltimos, majburiy maydonlarni (*) to\'ldiring.');
        return;
      }

      const booking = {
        fullName,
        phone,
        age: document.getElementById('age').value,
        email: document.getElementById('email').value,
        serviceType,
        bookingDate,
        bookingTime,
        notes: document.getElementById('notes').value
      };

      // Trackerni chaqirish
      if (typeof window.sinbadSaveBooking === 'function') {
        window.sinbadSaveBooking(booking);
      }

      lastBooking = booking;

      // Muvaffaqiyat xabarini ko'rsatish
      document.getElementById('bookingForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    }

    function downloadMyBooking() {
      if (!lastBooking) return;

      // Excel (CSV) formatida yuklab olish
      const headers = ['Ism Familiya', 'Telefon', 'Yosh', 'Email', 'Xizmat', 'Sana', 'Vaqt', 'Izoh', 'Yozilgan Vaqt'];
      const row = [
        lastBooking.fullName,
        lastBooking.phone,
        lastBooking.age || '',
        lastBooking.email || '',
        lastBooking.serviceType,
        lastBooking.bookingDate,
        lastBooking.bookingTime,
        lastBooking.notes || '',
        new Date().toLocaleString('uz-UZ')
      ];

      const csv = '\uFEFF' + headers.join(',') + '\n' + row.map(v => `"${v}"`).join(',');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `sinbad-qayd-${lastBooking.bookingDate}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
  
</body>
</html>
